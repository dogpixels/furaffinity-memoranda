<!DOCTYPE html>
<html>
    <head>
        <title>FurAffinity Memoranda Settings</title>
		<meta http-equiv="content-type" content="text/html; charset=utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/common.css" />
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                color: rgba(255, 255, 255, 0.92);
                font-family: Open Sans, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;
                font-size: 15px;
                background-color: #353b45;
            }
            main {
                margin: 10px;
                height: calc(max(100vh, 100%) - 24px);
            }
            main > section {
                margin: 0 10px;
            }
            a {
                color: rgba(255, 255, 255, 0.92);
                text-decoration: underline dotted 1px;
            }
            input, textarea, #usernames > li {
                color: rgba(255, 255, 255, 0.92);
                background-color: rgba(0, 0, 0, 0.15);
                outline: none;
                padding: 5px 7px;
                min-height: 30px;
                border: 0;
                border-radius: 7px;
                width: 100%;
            }
            input:focus, textarea:focus {
                border: 1px #69697d solid;
                background-color: #4e5561;
            }

            .flex {display: flex}
            .flex > * {flex: 1}

            ul#usernames {
                display: grid;
                /* 260px min fits 30 characters, which is FA's maximum username length */
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                column-gap: 11px;
                padding: 0;
            }

            ul#usernames li {
                list-style: none;
                margin-bottom: 10px;
            }
            ul#usernames li:hover {
                cursor: pointer;
                background-color: #4e5561;
            }

            #indicator {
                text-align: right;
            }
            footer {
                min-height: 24px;
                width: 100%;
                padding: 2px 20px;
                background-color: rgba(0, 0, 0, 0.15);
            }
        </style>
    </head>
    <body>
        <main class="flex">
            <section>
                <h2>Search</h2>
                <input id="search" type="text" maxlength="4000" placeholder="🔎 search within all notes" />
                <h2 id="usernameTitle">(loading…)</h2>
                <ul id="usernames"></ul>
            </section>
            <section id="famemo">
                <h2>Notes <span id="currentUsername"></span></h2>
                <textarea id="textarea" rows="24" maxlength="4000" placeholder="select an existing username to load notes"></textarea>
                <div class="flex">
                    <div><span id="famemo-charcount">0</span> / 4000</div>
                    <div class="famemo-text-right"><span id="famemo-status-indicator"></span></div>
                </div>
            </section>
        </main>

        <footer>
            FurAffinity Memoranda | by <a href="https://www.furaffinity.net/user/draconigen">Flam</a> | not affiliated with FurAffinity
        </footer>
        <script src="../js/common.content+options.js"></script>
        <script src="../js/options.js"></script>
    </body>
</html>
